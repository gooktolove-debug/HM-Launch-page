<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HM Tools Hub</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 32px;
    }

    p {
      margin-bottom: 32px;
      color: #6b7280;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 28px 20px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid #e5e7eb;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .card span {
      display: block;
      font-size: 14px;
      color: #6b7280;
      word-break: break-word;
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Harbourmaster App Hub</h1>
    <p></p>

    <div class="grid">
      <a class="card" href="https://hm-emergency-moorings.vercel.app/" target="_blank" rel="noopener noreferrer">
        <h2>Emergency Mooring Board</h2>
        <span>Open Emergency Mooring Board</span>
      </a>

      <a class="card" href="https://gooktolove-debug.github.io/HM-pinksticker/" target="_blank" rel="noopener noreferrer">
        <h2>Pink Sticker Register</h2>
        <span>Open Pink Sticker Register</span>
      </a>

      <a class="card" href="https://gooktolove-debug.github.io/hm-team-map/" target="_blank" rel="noopener noreferrer">
        <h2>HM Signs</h2>
        <span>Open HM Signs</span>
      </a>
      <a class="card" href="https://gooktolove-debug.github.io/HM-wreck-abandoned/" target="_blank" rel="noopener noreferrer">
        <h2>Wreck / Abandoned Board</h2>
        <span>Open Wreck / Abandoned Board</span>
      </a>
    </div>

    <div class="footer">
      
    </div>
  </div>
</body>
</html>
